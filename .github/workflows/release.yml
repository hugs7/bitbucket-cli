name: release

# Trigger: pushing a semver tag like v0.1.0 cuts a release.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write   # create GitHub Release + upload assets
  packages: write   # (optional) push to GHCR if you ever add docker
  id-token: write   # (optional) for OIDC / cosign signing later

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0      # GoReleaser needs full history for changelog

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: true

      - name: Set up Python (for cloudsmith-cli)
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install cloudsmith-cli
        run: pip install --upgrade cloudsmith-cli

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          # Default GITHUB_TOKEN can publish to *this* repo only.
          # To publish to your homebrew-tap / scoop-bucket / winget-pkgs
          # forks you need a Personal Access Token (classic, scope: repo,
          # workflow) saved as a repo secret named TAP_GITHUB_TOKEN, then
          # uncomment the line below.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # GITHUB_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
          CLOUDSMITH_API_KEY: ${{ secrets.CLOUDSMITH_API_KEY }}
