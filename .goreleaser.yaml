# GoReleaser config — produces cross-platform binaries, archives, deb/rpm
# packages, Homebrew tap, Scoop bucket and winget manifests.
# Docs: https://goreleaser.com/

version: 2

project_name: bb

before:
  hooks:
    - go mod tidy

builds:
  - id: bb
    main: ./cmd/bb
    binary: bb
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}

archives:
  - id: default
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: checksums.txt

snapshot:
  version_template: "{{ .Tag }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

nfpms:
  - id: bb
    package_name: bb
    vendor: bb contributors
    homepage: https://github.com/hugo/bb
    maintainer: bb contributors
    description: A comprehensive command-line interface for Bitbucket.
    license: MIT
    formats:
      - deb
      - rpm
      - apk

brews:
  - name: bb
    repository:
      owner: hugo
      name: homebrew-tap
    homepage: https://github.com/hugo/bb
    description: A comprehensive command-line interface for Bitbucket.
    license: MIT
    test: |
      system "#{bin}/bb version"

scoops:
  - name: bb
    repository:
      owner: hugo
      name: scoop-bucket
    homepage: https://github.com/hugo/bb
    description: A comprehensive command-line interface for Bitbucket.
    license: MIT

winget:
  - name: bb
    publisher: hugo
    license: MIT
    homepage: https://github.com/hugo/bb
    short_description: A comprehensive command-line interface for Bitbucket.
    repository:
      owner: hugo
      name: winget-pkgs
      branch: bb-{{.Version}}
