# GoReleaser config — produces cross-platform binaries, archives, deb/rpm
# packages, Homebrew tap, Scoop bucket and winget manifests.
# Docs: https://goreleaser.com/

version: 2

project_name: bb

before:
  hooks:
    - go mod tidy

builds:
  - id: bb
    main: ./cmd/bb
    binary: bb
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}

archives:
  - id: default
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: checksums.txt

snapshot:
  version_template: "{{ .Tag }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

nfpms:
  - id: bb
    package_name: bb
    vendor: bb contributors
    homepage: https://github.com/hugs7/bitbucket-cli
    maintainer: bb contributors
    description: A comprehensive command-line interface for Bitbucket.
    license: MIT
    formats:
      - deb
      - rpm
      - apk

# Push the .deb / .rpm / .apk files to Cloudsmith so users can install
# and update them via apt / dnf / apk natively. Requires the
# `cloudsmith-cli` Python package on the runner (installed in the
# release workflow) and a CLOUDSMITH_API_KEY repo secret.
#
# Distro is set to "any-distro/any-version" (alpine/any-version for
# .apk) so we publish a single set of artifacts that works across
# Debian, Ubuntu, Mint, Fedora, RHEL, etc.
publishers:
  - name: cloudsmith
    ids: [bb]
    # Skip anything that isn't a Linux package (archives, checksums…).
    disable: '{{ if not (or (eq .Ext ".deb") (eq .Ext ".rpm") (eq .Ext ".apk")) }}true{{ end }}'
    cmd: >-
      cloudsmith push
      {{- if eq .Ext ".deb" }} deb hugs7/bb/any-distro/any-version
      {{- else if eq .Ext ".rpm" }} rpm hugs7/bb/any-distro/any-version
      {{- else }} alpine hugs7/bb/alpine/any-version{{ end }}
      {{ .ArtifactPath }}
    env:
      - CLOUDSMITH_API_KEY={{ .Env.CLOUDSMITH_API_KEY }}

brews:
  - name: bb
    repository:
      owner: hugs7
      name: homebrew-tap
    homepage: https://github.com/hugs7/bitbucket-cli
    description: A comprehensive command-line interface for Bitbucket.
    license: MIT
    test: |
      system "#{bin}/bb version"

scoops:
  - name: bb
    repository:
      owner: hugs7
      name: scoop-bucket
    homepage: https://github.com/hugs7/bitbucket-cli
    description: A comprehensive command-line interface for Bitbucket.
    license: MIT
