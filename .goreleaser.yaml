# GoReleaser config — produces cross-platform binaries, archives, deb/rpm
# packages, Homebrew tap, Scoop bucket and winget manifests.
# Docs: https://goreleaser.com/

version: 2

project_name: bb

before:
  hooks:
    - go mod tidy
    # Generate shell completion scripts for bash, zsh and fish from
    # the cobra command tree. The output files are picked up further
    # down by archives.files (so manual / curl-tar users find them
    # in the tarball) and nfpms.contents (so apt / dnf / apk drop
    # them into the system-wide completion dirs at install time).
    # The completions/ dir is gitignored — it's a build artifact.
    - mkdir -p completions
    - sh -c "go run ./cmd/bb completion bash > completions/bb.bash"
    - sh -c "go run ./cmd/bb completion zsh > completions/_bb"
    - sh -c "go run ./cmd/bb completion fish > completions/bb.fish"

builds:
  - id: bb
    main: ./cmd/bb
    binary: bb
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}

archives:
  - id: default
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    format_overrides:
      - goos: windows
        format: zip
    # Bundle the generated completion scripts alongside the binary
    # so users who install via curl + tar (or `bb upgrade`) can drop
    # them into their shell's completion dir manually.
    files:
      - LICENSE
      - README.md
      - completions/*

checksum:
  name_template: checksums.txt

snapshot:
  version_template: "{{ .Tag }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

nfpms:
  - id: bb
    # Package name is the long, descriptive form ("bitbucket-cli") so
    # `apt install bitbucket-cli` reads naturally. The binary itself
    # stays short (`bb`) — see builds[].binary above. We also declare
    # `bb` as a virtual provides/replaces so anyone who installed the
    # earlier v0.1.0 (which was packaged as `bb`) is upgraded cleanly.
    package_name: bitbucket-cli
    provides:
      - bb
    replaces:
      - bb
    conflicts:
      - bb
    vendor: bitbucket-cli contributors
    homepage: https://github.com/hugs7/bitbucket-cli
    maintainer: bitbucket-cli contributors
    description: A comprehensive command-line interface for Bitbucket.
    license: MIT
    formats:
      - deb
      - rpm
      - apk
    # Drop the generated completion scripts into the standard
    # system-wide locations so `apt install bitbucket-cli` /
    # `dnf install bitbucket-cli` / `apk add bitbucket-cli` enable
    # tab completion automatically — no extra steps for the user.
    contents:
      - src: ./completions/bb.bash
        dst: /usr/share/bash-completion/completions/bb
        file_info:
          mode: 0644
      - src: ./completions/_bb
        dst: /usr/share/zsh/site-functions/_bb
        file_info:
          mode: 0644
      - src: ./completions/bb.fish
        dst: /usr/share/fish/vendor_completions.d/bb.fish
        file_info:
          mode: 0644

# Push the .deb / .rpm / .apk files to Cloudsmith so users can install
# and update them via apt / dnf / apk natively. Requires the
# `cloudsmith-cli` Python package on the runner (installed in the
# release workflow) and a CLOUDSMITH_API_KEY repo secret.
#
# Distro is set to "any-distro/any-version" (alpine/any-version for
# .apk) so we publish a single set of artifacts that works across
# Debian, Ubuntu, Mint, Fedora, RHEL, etc.
publishers:
  - name: cloudsmith
    ids: [bb]
    # GoReleaser passes every artifact in the `bb` build group (.deb,
    # .rpm, .apk, .tar.gz, .zip, …) to this publisher. We dispatch on
    # the file extension in shell rather than via a `disable:` template
    # because the publisher template context doesn't reliably expose
    # .Format / .Ext for all artifact types.
    cmd: |
      sh -c 'case "{{ .ArtifactPath }}" in
        *.deb) exec cloudsmith push deb hugs7/bitbucket-cli/any-distro/any-version "{{ .ArtifactPath }}" ;;
        *.rpm) exec cloudsmith push rpm hugs7/bitbucket-cli/any-distro/any-version "{{ .ArtifactPath }}" ;;
        *.apk) exec cloudsmith push alpine hugs7/bitbucket-cli/alpine/any-version "{{ .ArtifactPath }}" ;;
        *)     echo "cloudsmith: skipping {{ .ArtifactPath }}"; exit 0 ;;
      esac'
    env:
      - CLOUDSMITH_API_KEY={{ .Env.CLOUDSMITH_API_KEY }}

brews:
  # Formula name is the descriptive form ("bitbucket-cli") so users
  # type `brew install hugs7/tap/bitbucket-cli`. The installed binary
  # is still `bb` (set in builds[].binary) — Homebrew formula name and
  # binary name don't have to match.
  - name: bitbucket-cli
    repository:
      owner: hugs7
      name: homebrew-tap
    homepage: https://github.com/hugs7/bitbucket-cli
    description: A comprehensive command-line interface for Bitbucket.
    license: MIT
    # Wire the bundled completion scripts into Homebrew's per-shell
    # completion dirs. brew automatically links them onto the user's
    # FPATH / bash-completion path during `brew install`, so tab
    # completion lights up the moment a new shell session starts.
    extra_install: |
      bash_completion.install "completions/bb.bash" => "bb"
      zsh_completion.install "completions/_bb"
      fish_completion.install "completions/bb.fish"
    test: |
      system "#{bin}/bb version"

scoops:
  - name: bb
    repository:
      owner: hugs7
      name: scoop-bucket
    homepage: https://github.com/hugs7/bitbucket-cli
    description: A comprehensive command-line interface for Bitbucket.
    license: MIT
